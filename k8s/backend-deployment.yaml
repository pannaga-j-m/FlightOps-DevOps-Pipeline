apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flight-backend
  template:
    metadata:
      labels:
        app: flight-backend
    spec:
      containers:
      - name: backend
        image: 603433801149.dkr.ecr.ap-south-1.amazonaws.com/flight-backend:latest
        ports:
        - containerPort: 3000
